name: PrivateCamera
options:
  bundleIdPrefix: com.privatecamera
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: PrivateCamera/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: PrivateCamera/Supporting/PrivateCamera.entitlements

targets:
  PrivateCamera:
    type: application
    platform: iOS
    sources:
      - path: PrivateCamera
    settings:
      base:
        # IMPORTANT: DO NOT change this bundle ID — photo data on device depends on it
        PRODUCT_BUNDLE_IDENTIFIER: com.privatecamera.app
        INFOPLIST_FILE: PrivateCamera/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PrivateCamera/Supporting/PrivateCamera.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Automatic signing for real device deployment
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - PrivateCameraTests
      run:
        disableMainThreadChecker: false
      environmentVariables:
        - variable: PRESERVE_APP_DATA
          value: "1"
          isEnabled: true

  PrivateCameraTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PrivateCameraTests
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - target: PrivateCamera
